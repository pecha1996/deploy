<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CEO Crypto App</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            font-family: -apple-system, 'SF Pro Text', 'SF Pro Display', 'Inter', system-ui, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Мобильный контейнер — как экран телефона */
        .app-screen {
            max-width: 390px;
            width: 100%;
            background-color: #0b0e12;
            color: #ffffff;
            border-radius: 32px;
            overflow-y: auto;
            overflow-x: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            position: relative;
            height: 780px;
            display: flex;
            flex-direction: column;
            /* Отступ под системную строку состояния (время, батарея) */
            padding-top: env(safe-area-inset-top);
        }

        /* Скрываем скроллбар, но оставляем прокрутку */
        .app-screen::-webkit-scrollbar {
            width: 4px;
        }
        .app-screen::-webkit-scrollbar-track {
            background: #1e1e2a;
        }
        .app-screen::-webkit-scrollbar-thumb {
            background: #3a3a4a;
            border-radius: 10px;
        }

        /* Профиль (без кастомного статус-бара) */
        .profile-header {
            padding: 12px 20px 12px 20px;
            border-bottom: 0.5px solid #2c2f36;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .profile-info {
            display: flex;
            flex-direction: column;
        }
        .profile-handle {
            font-size: 18px;
            font-weight: 700;
            color: white;
            letter-spacing: -0.3px;
        }
        .profile-id {
            font-size: 13px;
            color: #8e8e9a;
            margin-top: 4px;
            font-family: monospace;
            letter-spacing: 0.2px;
        }
        .profile-avatar {
            background: linear-gradient(135deg, #2c2f3a, #1b1e26);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid #3e4250;
        }
        .profile-avatar i {
            font-size: 24px;
            color: #c7c9d1;
        }

        /* ========= ОСНОВНОЙ КОНТЕНТ ========= */
        .main-content {
            flex: 1;
            padding: 16px 20px 30px 20px;
        }

        /* Блок Bitcoin */
        .asset-card {
            background: #12141c;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 24px;
            border: 0.5px solid #2a2d36;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }
        .asset-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
        }
        .asset-name {
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .asset-name i {
            font-size: 24px;
            color: #f7931a;
        }
        .asset-badge {
            background: #1f222c;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: #b9bbcd;
        }
        .btc-amount {
            font-size: 32px;
            font-weight: 700;
            margin: 12px 0 8px 0;
            letter-spacing: -0.5px;
        }
        .usd-values {
            display: flex;
            gap: 24px;
            margin-bottom: 20px;
        }
        .usd-value {
            background: #1a1d26;
            padding: 10px 16px;
            border-radius: 20px;
            flex: 1;
            text-align: center;
        }
        .usd-label {
            font-size: 12px;
            color: #8f92a0;
            margin-bottom: 4px;
        }
        .usd-number {
            font-size: 18px;
            font-weight: 600;
        }
        .forecast-link {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            color: #3b82f6;
            font-weight: 500;
            font-size: 15px;
        }
        .forecast-link i {
            font-size: 12px;
        }

        /* Блоки прогнозов по датам */
        .price-prediction {
            background: #0e1017;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 20px;
            border: 0.5px solid #282b33;
        }
        .prediction-title {
            font-size: 14px;
            font-weight: 600;
            color: #bdc1d0;
            margin-bottom: 8px;
        }
        .prediction-date {
            font-size: 15px;
            font-weight: 500;
            color: white;
            margin-bottom: 6px;
        }
        .prediction-time {
            font-size: 13px;
            color: #6c7080;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .time-badge {
            background: #1f212b;
            padding: 4px 10px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 12px;
        }

        /* Фьючерсы */
        .futures-section {
            margin: 28px 0 24px 0;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 14px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
        }
        .section-more {
            font-size: 14px;
            color: #3b82f6;
        }
        .futures-grid {
            display: flex;
            gap: 16px;
            background: #12141c;
            border-radius: 28px;
            padding: 16px 20px;
            border: 0.5px solid #2a2d36;
        }
        .future-item {
            flex: 1;
            text-align: center;
        }
        .future-symbol {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 8px;
        }
        .future-change {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .negative {
            color: #ff5c5c;
        }
        .positive {
            color: #2dc96b;
        }

        /* Подписки */
        .subscription-card {
            background: #12141c;
            border-radius: 28px;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 0.5px solid #2a2d36;
            margin-top: 12px;
            margin-bottom: 20px;
        }
        .sub-text {
            font-weight: 600;
            font-size: 16px;
        }
        .sub-arrow {
            color: #3b82f6;
            font-size: 18px;
        }

        .clickable {
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        .clickable:active {
            opacity: 0.7;
        }

        @media (max-width: 400px) {
            .app-screen {
                border-radius: 0;
                height: 100vh;
            }
            .usd-values {
                gap: 12px;
            }
            .futures-grid {
                gap: 8px;
                padding: 14px;
            }
        }
    </style>
</head>
<body>
<div class="app-screen">
    <!-- Нет кастомного статус-бара — системный покажет время, батарею, сигнал -->
    <div class="profile-header">
        <div class="profile-info">
            <div class="profile-handle">@ceo00000000001</div>
            <div class="profile-id">ceo.000000000001</div>
        </div>
        <div class="profile-avatar">
            <i class="fas fa-user-astronaut"></i>
        </div>
    </div>

    <div class="main-content">
        <!-- Bitcoin блок -->
        <div class="asset-card">
            <div class="asset-header">
                <div class="asset-name">
                    <i class="fab fa-bitcoin"></i> Bitcoin
                </div>
                <div class="asset-badge">BTC</div>
            </div>
            <div class="btc-amount">0 BTC</div>
            <div class="usd-values">
                <div class="usd-value">
                    <div class="usd-label">Price</div>
                    <div class="usd-number">$0.00</div>
                </div>
                <div class="usd-value">
                    <div class="usd-label">Value</div>
                    <div class="usd-number">$0.00</div>
                </div>
            </div>
            <div class="forecast-link clickable" id="forecastBtn">
                <span>Прогнозы</span> <i class="fas fa-chevron-right"></i>
            </div>
        </div>

        <!-- Bitcoin price forecast -->
        <div class="price-prediction">
            <div class="prediction-title">BITCOIN FORECAST</div>
            <div class="prediction-date">Bitcoin price on Mar 31, 2026 at 3am EDT</div>
            <div class="prediction-time">
                <i class="far fa-clock"></i> 
                <span class="time-badge">09:00</span>
                <span style="font-size:12px;">estimated</span>
            </div>
        </div>

        <!-- Ethereum price forecast -->
        <div class="price-prediction">
            <div class="prediction-title">ETHEREUM FORECAST</div>
            <div class="prediction-date">Ethereum price on Mar 31, 2026 at 3am EDT</div>
            <div class="prediction-time">
                <i class="far fa-calendar-alt"></i> 
                <span>On Mar 31, 2026</span>
            </div>
        </div>

        <!-- Персы (фьючерсы) -->
        <div class="futures-section">
            <div class="section-header">
                <div class="section-title">Персы (фьючерсы)</div>
                <div class="section-more clickable" id="futuresMoreBtn"><i class="fas fa-chart-line"></i> Детали <i class="fas fa-chevron-right" style="font-size: 10px;"></i></div>
            </div>
            <div class="futures-grid">
                <div class="future-item">
                    <div class="future-symbol">BTC</div>
                    <div class="future-change negative">
                        <i class="fas fa-arrow-down"></i> -0.05%
                    </div>
                </div>
                <div class="future-item">
                    <div class="future-symbol">ETH</div>
                    <div class="future-change positive">
                        <i class="fas fa-arrow-up"></i> +0.45%
                    </div>
                </div>
                <div class="future-item">
                    <div class="future-symbol">CL</div>
                    <div class="future-change positive">
                        <i class="fas fa-arrow-up"></i> +1.6%
                    </div>
                </div>
            </div>
        </div>

        <!-- Подписки -->
        <div class="subscription-card clickable" id="subscriptionBtn">
            <div class="sub-text">
                <i class="fas fa-bell" style="margin-right: 8px;"></i> Подписки
            </div>
            <div class="sub-arrow"><i class="fas fa-chevron-right"></i></div>
        </div>

        <div style="height: 20px;"></div>
    </div>
</div>

<script>
    // Интерактив (alert'ы для демо)
    const forecastBtn = document.getElementById('forecastBtn');
    const futuresMoreBtn = document.getElementById('futuresMoreBtn');
    const subscriptionBtn = document.getElementById('subscriptionBtn');

    if (forecastBtn) forecastBtn.addEventListener('click', () => alert("📊 Прогнозы: Bitcoin & Ethereum. Детальная аналитика скоро."));
    if (futuresMoreBtn) futuresMoreBtn.addEventListener('click', () => alert("📈 Фьючерсы: BTC -0.05%, ETH +0.45%, CL +1.6% (нефть). Графики в разработке."));
    if (subscriptionBtn) subscriptionBtn.addEventListener('click', () => alert("🔔 Управление подписками: push-уведомления, обновления курсов."));

    const predictionCards = document.querySelectorAll('.price-prediction');
    predictionCards.forEach(card => {
        card.classList.add('clickable');
        card.addEventListener('click', () => {
            const title = card.querySelector('.prediction-title')?.innerText || 'Прогноз';
            alert(`📅 ${title} — подробная информация будет доступна в обновлении.`);
        });
    });

    const assetCard = document.querySelector('.asset-card');
    if (assetCard) {
        assetCard.addEventListener('click', (e) => {
            if (forecastBtn && forecastBtn.contains(e.target)) return;
            alert("Bitcoin кошелёк: 0 BTC, баланс $0.00. Пополнение в разработке.");
        });
    }

    const futureItems = document.querySelectorAll('.future-item');
    futureItems.forEach(item => {
        item.classList.add('clickable');
        item.addEventListener('click', () => {
            const symbol = item.querySelector('.future-symbol')?.innerText || 'актив';
            const change = item.querySelector('.future-change')?.innerText || '0%';
            alert(`${symbol} фьючерс: ${change}. Графики в реальном времени скоро.`);
        });
    });
</script>
</body>
</html>
