<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Моё приложение</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      font-family: Arial, sans-serif;
      background-color: #000;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .block {
      position: relative;
      width: 100%;
      overflow: hidden;
      margin-bottom: -4px; /* убирает полоску между блоками на некоторых экранах */
      cursor: pointer; /* показываем, что блок кликабелен */
    }

    img.preview-img {
      width: 100%;
      height: auto;
      display: block;
    }

    input[type="file"] { display: none; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="block" id="headerBlock">
    <img id="headerPreview" class="preview-img" alt="Header Фото">
    <input type="file" id="headerUpload" accept="image/*">
  </div>

  <!-- BODY -->
  <div class="block" id="bodyBlock">
    <img id="bodyPreview" class="preview-img" alt="Body Фото">
    <input type="file" id="bodyUpload" accept="image/*">
  </div>

  <!-- FOOTER -->
  <div class="block" id="footerBlock">
    <img id="footerPreview" class="preview-img" alt="Footer Фото">
    <input type="file" id="footerUpload" accept="image/*">
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log('Service Worker registered'));
    }

    function setupUpload(blockId, inputId, previewId) {
      const block = document.getElementById(blockId);
      const input = document.getElementById(inputId);
      const preview = document.getElementById(previewId);

      // Тап по блоку открывает выбор файла
      block.addEventListener('click', () => input.click());

      // Загрузка фото
      input.addEventListener('change', () => {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          preview.src = e.target.result;
        };
        reader.readAsDataURL(file);

        // Подгоняем блок под размер изображения
        preview.onload = () => {
          const aspectRatio = preview.naturalHeight / preview.naturalWidth;
          const width = block.clientWidth;
          block.style.height = (width * aspectRatio) + 'px';
        };
      });
    }

    setupUpload('headerBlock', 'headerUpload', 'headerPreview');
    setupUpload('bodyBlock', 'bodyUpload', 'bodyPreview');
    setupUpload('footerBlock', 'footerUpload', 'footerPreview');
  </script>
</body>
</html>
