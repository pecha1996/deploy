<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My App</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0f0f">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    /* 🔝 TOP BAR */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(20,20,20,0.9);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
      z-index: 1000;
    }

    .coin {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .coin-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: orange;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .coin-info {
      display: flex;
      flex-direction: column;
      font-size: 14px;
    }

    .balance {
      text-align: right;
      font-size: 14px;
    }

    /* 📦 CONTENT */
    .content {
      padding: 90px 15px 90px;
    }

    .card {
      background: #1c1c1c;
      border-radius: 20px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .card img {
      width: 100%;
      border-radius: 15px;
    }

    /* 🔘 INSTALL BUTTON */
    .install-btn {
      margin-top: 10px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #4CAF50;
      color: white;
      font-size: 16px;
    }

    /* 🔻 BOTTOM NAV */
    .navbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(20,20,20,0.9);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .nav-item {
      text-align: center;
      font-size: 12px;
      opacity: 0.6;
    }

    .nav-item.active {
      opacity: 1;
      color: #a78bfa;
    }

    .icon {
      font-size: 20px;
      display: block;
    }

  </style>
</head>

<body>

  <!-- 🔝 TOP BAR -->
  <div class="topbar">
    <div class="coin">
      <div class="coin-icon">₿</div>
      <div class="coin-info">
        <b>Bitcoin</b>
        <span style="opacity:0.6;">0 BTC</span>
      </div>
    </div>

    <div class="balance">
      <div>$0.00</div>
      <div style="opacity:0.6;">$0.00</div>
    </div>
  </div>

  <!-- 📦 CONTENT -->
  <div class="content">

    <div class="card">
      <img src="your-image.jpg">
    </div>

    <div class="card">
      <h3>Install App</h3>
      <button id="installBtn" class="install-btn">Install</button>
    </div>

  </div>

  <!-- 🔻 BOTTOM NAV -->
  <div class="navbar">
    <div class="nav-item active">
      <span class="icon">🏠</span>
    </div>
    <div class="nav-item">
      <span class="icon">💳</span>
    </div>
    <div class="nav-item">
      <span class="icon">🔄</span>
    </div>
    <div class="nav-item">
      <span class="icon">💬</span>
    </div>
    <div class="nav-item">
      <span class="icon">🔍</span>
    </div>
  </div>

  <script>
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt = null;
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>

</body>
</html>
