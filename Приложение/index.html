<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Конструктор приложений</title>
  <meta name="theme-color" content="#222" id="themeColorMeta" />
  <style>
    :root {
      --panel-bg: rgba(0, 0, 0, 0.72);
      --surface: #222;
      --text: #fff;
      --body-bg: #111;
      --danger: #ff5c5c;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--body-bg);
      color: var(--text);
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
      min-height: 100vh;
      overflow-y: hidden;
      overflow-x: hidden;
      transition: filter 0.2s ease;
    }

    /* Блюр для экрана предпросмотра в диспетчере приложений */
    body.app-obscured #app {
      filter: blur(32px) brightness(0.35);
      pointer-events: none;
      user-select: none;
    }

    .block {
      width: 100vw;
      min-width: 100vw;
      margin: 0;
      padding: 0;
      position: relative;
    }

    #header,
    #footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100vw;
      justify-content: center;
      overflow: hidden;
      background: var(--surface);
      min-height: 56px;
      text-align: center;
      padding: 8px;
      border: none;
      outline: none;
      box-shadow: none;
    }

    #header.fixed {
      position: fixed !important;
      top: 0;
      left: 0;
      width: 100vw;
      z-index: 9999;
    }

    #footer.fixed {
      position: fixed !important;
      bottom: 0;
      left: 0;
      width: 100vw;
      height: auto;
      z-index: 9999;
      padding-bottom: 0;
    }

    #header.has-image,
    #footer.has-image {
      color: transparent;
      font-size: 0;
      line-height: 0;
      padding: 0;
      min-height: 0;
      align-items: stretch;
      justify-content: flex-start;
    }

    #body {
      flex: 1 1 auto;
      overflow-y: auto;
      overflow-x: hidden;
      width: 100vw;
      min-width: 100vw;
      min-height: 0;
    }

    .block img {
      width: 100vw;
      display: block;
      object-fit: cover;
      max-width: 100%;
      border: none;
      margin: 0;
      padding: 0;
      vertical-align: top;
    }

    .block textarea {
      width: 100vw;
      min-height: 100px;
      background: #333;
      color: #fff;
      border: none;
      padding: 10px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 16px;
    }

    .code-actions {
      display: flex;
      gap: 8px;
      padding: 0;
      background: transparent;
    }

    .code-actions button {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      background: #444;
      color: #fff;
      cursor: pointer;
    }

    .code-actions button.execute {
      background: #2f7d32;
    }

    .code-actions button.clear {
      background: var(--danger);
    }

    .executed-code {
      width: 100%;
      min-width: 100%;
      max-width: 100vw;
      overflow-x: auto;
      background: transparent;
    }

    .executed-code * {
      max-width: 100vw !important;
      box-sizing: border-box;
    }

    .executed-frame {
      width: 100%;
      border: none;
      display: block;
      background: transparent;
    }

    #control-panel {
      position: fixed;
      right: 10px;
      top: max(10px, env(safe-area-inset-top));
      background: var(--panel-bg);
      backdrop-filter: blur(8px);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      z-index: 10000;
      border-radius: 8px;
      pointer-events: auto;
      transition: transform 0.3s;
      max-width: calc(100vw - 20px);
    }

    #control-panel.hidden {
      transform: translateX(120%);
    }

    #control-panel button {
      padding: 7px 10px;
      cursor: pointer;
      border-radius: 6px;
      border: 1px solid #666;
      background: #2f2f2f;
      color: #fff;
    }

    #control-panel label {
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }

    .horizontal-scroll {
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      gap: 0;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -ms-overflow-style: none;
      touch-action: pan-x pan-y;
    }

    .horizontal-scroll img {
      flex-shrink: 0;
      width: auto !important;
      max-width: none !important;
      min-width: 0 !important;
      min-height: 0 !important;
      height: auto !important;
      object-fit: contain;
      scroll-snap-align: start;
    }

    .natural-image-block img {
      width: auto !important;
      height: auto !important;
      max-width: none !important;
      object-fit: contain !important;
    }

    body.ui-hidden .code-actions,
    body.ui-hidden .block textarea {
      display: none !important;
    }

    .horizontal-scroll::-webkit-scrollbar {
      display: none;
    }

    .body-block {
      border: none;
      margin: 0;
      padding: 0;
    }

    .media-block {
      line-height: 0;
    }

    .top-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    #header.has-image img,
    #footer.has-image img {
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    #sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 14000;
    }

    #sheet-backdrop.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #bottom-sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      max-height: 70vh;
      transform: translateY(105%);
      transition: transform 0.22s ease;
      background: #111;
      color: #fff;
      overflow-y: auto;
      z-index: 15000;
      padding: 14px;
      border-top-left-radius: 14px;
      border-top-right-radius: 14px;
    }

    #bottom-sheet.visible {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div id="sheet-backdrop"></div>
  <div id="bottom-sheet"></div>
  <div id="app">
    <div id="header" class="block" data-target="header">Header (тапните для редактирования)</div>
    <div id="body" class="block-container" data-target="body"></div>
    <div id="footer" class="block" data-target="footer">Footer (тапните для редактирования)</div>
  </div>

  <div id="control-panel">
    <div class="top-actions">
      <button type="button" id="add-header-image">Фото в header</button>
      <button type="button" id="add-footer-image">Фото в footer</button>
    </div>
    <button type="button" id="add-image">Добавить фото</button>
    <button type="button" id="add-code">Добавить код</button>
    <button type="button" id="add-horizontal">Горизонтальный блок</button>
    <button type="button" id="add-button-zone">Зона-кнопка</button>
    <button type="button" id="quick-corridor">Быстрый коридор</button>
    <button type="button" id="set-header-color">Цвет статус-бара</button>
    <button type="button" id="save-now">Сохранить</button>
    <button type="button" id="reset-layout">Сбросить проект</button>
    <label><input type="checkbox" id="fix-header" /> Закрепить header</label>
    <label><input type="checkbox" id="fix-footer" /> Закрепить footer</label>
    <label><input type="checkbox" id="enable-privacy-blur" checked /> Блюр в фоне</label>
  </div>

  <script>
    const app = document.getElementById('app');
    const panelEl = document.getElementById('control-panel');
    const themeMeta = document.getElementById('themeColorMeta');
    const fixHeader = document.getElementById('fix-header');
    const fixFooter = document.getElementById('fix-footer');
    const blurToggle = document.getElementById('enable-privacy-blur');

    let bodyEl;
    let headerEl;
    let footerEl;
    let currentTarget;
    let tapCount = 0;
    let tapTimeout;
    let touchStartY = 0;
    let isPulling = false;

    function updateThemeColorFromHeader() {
      const computedColor = window.getComputedStyle(headerEl).backgroundColor;
      themeMeta.setAttribute('content', toHexColor(computedColor) || '#222');
    }

    function updateBodyPadding() {
      const headerHeight = headerEl.getBoundingClientRect().height;
      const footerHeight = footerEl.getBoundingClientRect().height;
      bodyEl.style.paddingTop = headerEl.classList.contains('fixed') ? `${headerHeight}px` : '0';
      bodyEl.style.paddingBottom = footerEl.classList.contains('fixed') ? `${footerHeight}px` : '0';
    }

    function updateScrollHostMode() {
      app.style.height = '100vh';
      app.style.overflow = 'hidden';
      bodyEl.style.overflowY = 'auto';
      bodyEl.style.overflowX = 'hidden';
    }

    function normalizeTarget(target) {
      if (target === headerEl || target === footerEl || target === bodyEl) return target;
      return bodyEl;
    }

    function addDragHandle(parentBlock) {
      return parentBlock;
    } 

    function addImageBlock(target) {
      target = normalizeTarget(target);
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'image/*';
      fileInput.onchange = async (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        const dataUrl = await readFileAsDataUrl(file);
        if (!dataUrl) return;

        const img = document.createElement('img');
        img.src = dataUrl;
        img.alt = '';
        img.style.visibility = 'hidden';
        img.onerror = () => {
          img.remove();
        };

        if (target.id === 'header' || target.id === 'footer') {
          target.textContent = '';
          target.innerHTML = '';
          target.classList.add('has-image');
          target.appendChild(img);
          img.onload = () => {
            img.style.visibility = 'visible';
            target.style.height = 'auto';
            updateBodyPadding();
            updateThemeColorFromHeader();
            saveProject();
          };
        } else {
          const block = document.createElement('div');
          block.className = 'block body-block media-block';
          addDragHandle(block);
          block.appendChild(img);
          bodyEl.appendChild(block);
          img.onload = () => {
            img.style.visibility = 'visible';
          };
          saveProject();
        }
      };
      fileInput.click();
    }

    function executeCodeFromTextArea(textarea, outputRoot) {
      const code = textarea.value;
      outputRoot.innerHTML = '';
      if (!code.trim()) return;

      const codeBlock = document.createElement('div');
      codeBlock.classList.add('executed-code');
      const frame = document.createElement('iframe');
      frame.className = 'executed-frame';
      frame.sandbox = 'allow-scripts allow-same-origin';
      frame.srcdoc = code;
      frame.onload = () => {
        try {
          const doc = frame.contentDocument;
          const h = Math.max(doc?.documentElement?.scrollHeight || 0, doc?.body?.scrollHeight || 0, 120);
          frame.style.height = h + 'px';
        } catch {
          frame.style.height = '240px';
        }
      };
      codeBlock.appendChild(frame);
      outputRoot.appendChild(codeBlock);
    }

    function addCodeBlock(target) {
      target = normalizeTarget(target);
      if (target !== bodyEl) {
        alert('Код-блок можно добавить только в body.');
        return;
      }

      const block = document.createElement('div');
      block.className = 'block body-block';
      addDragHandle(block);

      const textarea = document.createElement('textarea');
      textarea.placeholder = 'Вставьте HTML/JS код';
      block.appendChild(textarea);

      const actions = document.createElement('div');
      actions.className = 'code-actions';

      const executeBtn = document.createElement('button');
      executeBtn.className = 'execute';
      executeBtn.type = 'button';
      executeBtn.textContent = 'Выполнить код';

      const clearBtn = document.createElement('button');
      clearBtn.className = 'clear';
      clearBtn.type = 'button';
      clearBtn.textContent = 'Очистить результат';

      actions.appendChild(executeBtn);
      actions.appendChild(clearBtn);
      block.appendChild(actions);

      const outputRoot = document.createElement('div');
      block.appendChild(outputRoot);

      executeBtn.addEventListener('click', () => {
        executeCodeFromTextArea(textarea, outputRoot);
        saveProject();
      });

      clearBtn.addEventListener('click', () => {
        outputRoot.innerHTML = '';
        saveProject();
      });

      bodyEl.appendChild(block);
      saveProject();
    }

    function addButtonZoneBlock(target) {
      target = normalizeTarget(target);
      if (target !== bodyEl) {
        alert('Зона-кнопка добавляется только в body.');
        return;
      }

      const block = document.createElement('div');
      block.className = 'block body-block';

      const button = document.createElement('button');
      button.type = 'button';
      button.textContent = prompt('Текст кнопки?', 'Открыть') || 'Открыть';
      button.style.width = '100%';
      button.style.padding = '22px 14px';
      button.style.border = 'none';
      button.style.background = '#2c2c2c';
      button.style.color = '#fff';
      button.style.borderRadius = '0';

      const actionType = prompt('Тип действия: url / sheet', 'url');
      if ((actionType || '').toLowerCase() === 'sheet') {
        const sheetHtml = prompt('HTML контент для нижнего окна (sheet)', '<h3>Нижнее окно</h3><p>Ваш контент</p>') || '';
        button.addEventListener('click', () => openBottomSheet(sheetHtml));
      } else {
        const targetUrl = prompt('URL для открытия (можно оставить пустым)', 'https://');
        if (targetUrl && targetUrl !== 'https://') {
          button.addEventListener('click', () => window.open(targetUrl, '_blank', 'noopener,noreferrer'));
        } else {
          const message = prompt('Текст действия по кнопке', 'Нажата зона-кнопка') || 'Нажата зона-кнопка';
          button.addEventListener('click', () => alert(message));
        }
      }

      block.appendChild(button);
      bodyEl.appendChild(block);
      saveProject();
    }

    function addHorizontalScrollBlock(target) {
      target = normalizeTarget(target);
      if (target !== bodyEl) {
        alert('Горизонтальный блок можно добавить только в body.');
        return;
      }

      const block = document.createElement('div');
      block.className = 'block body-block media-block natural-image-block horizontal-scroll';
      addDragHandle(block);
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'image/*';
      fileInput.multiple = true;

      fileInput.onchange = async (e) => {
        const files = Array.from(e.target.files || []);
        if (!files.length) return;

        for (const file of files) {
          const dataUrl = await readFileAsDataUrl(file);
          if (!dataUrl) continue;
          const img = document.createElement('img');
          img.src = dataUrl;
          img.alt = '';
          img.style.width = 'auto';
          img.style.height = 'auto';
          img.style.maxWidth = 'none';
          img.style.objectFit = 'contain';
          img.style.visibility = 'hidden';
          img.onload = () => {
            img.style.visibility = 'visible';
            const dpr = window.devicePixelRatio || 1;
            img.style.width = 'auto';
            img.style.height = img.naturalHeight + 'px';
          };
          img.onerror = () => {
            img.remove();
          };
          block.appendChild(img);
        }

        bodyEl.appendChild(block);
        saveProject();
      };

      fileInput.click();
    }

    function createImageSlotBlock(label) {
      const block = document.createElement('div');
      block.className = 'block body-block';

      const slotBtn = document.createElement('button');
      slotBtn.type = 'button';
      slotBtn.textContent = label || 'Добавить фото';
      slotBtn.style.width = '100%';
      slotBtn.style.padding = '26px 14px';
      slotBtn.style.border = 'none';
      slotBtn.style.background = '#242424';
      slotBtn.style.color = '#fff';

      slotBtn.addEventListener('click', () => {
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'image/*';
        fileInput.multiple = true;
        fileInput.onchange = async (e) => {
          const files = Array.from(e.target.files || []);
          if (!files.length) return;
          block.innerHTML = '';
          if (files.length > 1) {
            block.classList.add('horizontal-scroll', 'media-block', 'natural-image-block');
          } else {
            block.classList.add('media-block', 'natural-image-block');
            block.classList.remove('horizontal-scroll');
          }
          for (const file of files) {
            const dataUrl = await readFileAsDataUrl(file);
            if (!dataUrl) continue;
            const img = document.createElement('img');
            img.src = dataUrl;
            img.alt = '';
            img.style.visibility = 'hidden';
            img.onload = () => {
              img.style.visibility = 'visible';
              const dpr = window.devicePixelRatio || 1;
              img.style.width = 'auto';
              img.style.height = img.naturalHeight + 'px';
              saveProject();
            };
            img.onerror = () => {
              img.remove();
            };
            block.appendChild(img);
          }
          saveProject();
        };
        fileInput.click();
      });

      block.appendChild(slotBtn);
      return block;
    }

    function addQuickCorridorPreset() {
      const countRaw = prompt('Сколько секций в коридоре?', '6');
      const count = Math.max(1, Math.min(30, Number.parseInt(countRaw, 10) || 6));

      for (let i = 1; i <= count; i += 1) {
        bodyEl.appendChild(createImageSlotBlock('Секция ' + i + ' — добавить фото'));
        if (i % 3 === 0) {
          const branch = document.createElement('div');
          branch.className = 'block body-block';
          branch.innerHTML = '<button style=\"width:100%;padding:18px 14px;border:none;background:#353535;color:#fff;\">Ответвление / действие</button>';
          bodyEl.appendChild(branch);
        }
      }
      saveProject();
    }

    function toggleFix(section) {
      const el = document.getElementById(section);
      const isChecked = document.getElementById('fix-' + section).checked;

      if (isChecked) {
        el.classList.add('fixed');
      } else {
        el.classList.remove('fixed');
      }

      updateBodyPadding();
      updateScrollHostMode();
      updateThemeColorFromHeader();
      saveProject();
    }

    function saveProject() {
      const state = {
        appMarkup: app.innerHTML,
        fixHeader: fixHeader.checked,
        fixFooter: fixFooter.checked,
        blurEnabled: blurToggle.checked,
      };
      localStorage.setItem('appLayoutV2', JSON.stringify(state));
    }

    function loadProject() {
      const raw = localStorage.getItem('appLayoutV2');
      if (!raw) return;

      try {
        const state = JSON.parse(raw);
        if (state && state.appMarkup) {
          app.innerHTML = state.appMarkup;
        }
        fixHeader.checked = Boolean(state.fixHeader);
        fixFooter.checked = Boolean(state.fixFooter);
        blurToggle.checked = state.blurEnabled !== false;
      } catch (e) {
        console.warn('Не удалось загрузить сохраненный проект', e);
      }
    }

    function reacquireRefsAfterLoad() {
      // after app.innerHTML replace we need current DOM refs again
      headerEl = document.getElementById('header');
      bodyEl = document.getElementById('body');
      footerEl = document.getElementById('footer');
      currentTarget = bodyEl;
      headerEl.classList.remove('fixed');
      footerEl.classList.remove('fixed');

      if (!headerEl || !bodyEl || !footerEl) {
        location.reload();
      }
    }

    function setupEventDelegation() {
      document.addEventListener('click', (event) => {
        const targetRegion = event.target.closest('[data-target=\"body\"]');
        if (targetRegion) currentTarget = bodyEl;
      });

      document.body.addEventListener('click', () => {
        tapCount += 1;
        clearTimeout(tapTimeout);
        tapTimeout = setTimeout(() => {
          if (tapCount >= 2) {
            panelEl.classList.toggle('hidden');
            document.body.classList.toggle('ui-hidden');
          }
          tapCount = 0;
        }, 300);
      });
    }

    function runRefresh() {
      saveProject();
      window.location.reload();
    }

    function setupPullToRefreshForBody() {
      const pullState = { host: null };

      const onTouchStart = (event) => {
        const host = bodyEl;
        if (host.scrollTop > 2) return;
        pullState.host = host;
        touchStartY = event.touches[0].clientY;
        isPulling = true;
      };

      const onTouchMove = (event) => {
        if (!isPulling || !pullState.host) return;
        const delta = event.touches[0].clientY - touchStartY;
        if (delta > 28 && pullState.host.scrollTop <= 2) {
          isPulling = false;
          pullState.host = null;
          runRefresh();
        }
      };

      const onTouchEnd = () => {
        isPulling = false;
        pullState.host = null;
      };

      bodyEl.addEventListener('touchstart', onTouchStart, { passive: true });
      bodyEl.addEventListener('touchmove', onTouchMove, { passive: true });
      bodyEl.addEventListener('touchend', onTouchEnd);
      app.addEventListener('touchstart', onTouchStart, { passive: true });
      app.addEventListener('touchmove', onTouchMove, { passive: true });
      app.addEventListener('touchend', onTouchEnd);
    }

    function setupButtons() {
      document.getElementById('add-header-image').addEventListener('click', () => addImageBlock(headerEl));
      document.getElementById('add-footer-image').addEventListener('click', () => addImageBlock(footerEl));
      document.getElementById('add-image').addEventListener('click', () => addImageBlock(currentTarget));
      document.getElementById('add-code').addEventListener('click', () => addCodeBlock(currentTarget));
      document.getElementById('add-horizontal').addEventListener('click', () => addHorizontalScrollBlock(currentTarget));
      document.getElementById('add-button-zone').addEventListener('click', () => addButtonZoneBlock(currentTarget));
      document.getElementById('quick-corridor').addEventListener('click', addQuickCorridorPreset);
      document.getElementById('set-header-color').addEventListener('click', () => {
        const input = prompt('Введите цвет header (например #223344 или rgb(34,34,34))', window.getComputedStyle(headerEl).backgroundColor);
        if (!input) return;
        headerEl.style.background = input;
        updateThemeColorFromHeader();
        saveProject();
      });

      document.getElementById('save-now').addEventListener('click', saveProject);
      document.getElementById('reset-layout').addEventListener('click', () => {
        if (!confirm('Удалить сохраненный проект и перезагрузить страницу?')) return;
        localStorage.removeItem('appLayoutV2');
        location.reload();
      });

      fixHeader.addEventListener('change', () => toggleFix('header'));
      fixFooter.addEventListener('change', () => toggleFix('footer'));
    }

    function openBottomSheet(html) {
      const backdrop = document.getElementById('sheet-backdrop');
      const sheet = document.getElementById('bottom-sheet');
      sheet.innerHTML = html;
      backdrop.classList.add('visible');
      sheet.classList.add('visible');
    }

    function closeBottomSheet() {
      const backdrop = document.getElementById('sheet-backdrop');
      const sheet = document.getElementById('bottom-sheet');
      backdrop.classList.remove('visible');
      sheet.classList.remove('visible');
    }

    function setupPrivacyBlurForAppSwitcher() {
      const obscure = () => document.body.classList.add('app-obscured');
      const reveal = () => document.body.classList.remove('app-obscured');

      document.addEventListener('visibilitychange', () => {
        if (!blurToggle.checked) return;
        if (document.visibilityState === 'hidden') obscure();
        if (document.visibilityState === 'visible') reveal();
      });

      window.addEventListener('pagehide', () => {
        if (blurToggle.checked) obscure();
      });
      window.addEventListener('pageshow', reveal);
      window.addEventListener('blur', () => {
        if (blurToggle.checked) obscure();
      });
      window.addEventListener('focus', reveal);
    }

    function toHexColor(color) {
      const match = (color || '').match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/i);
      if (!match) return color;
      const r = Number(match[1]).toString(16).padStart(2, '0');
      const g = Number(match[2]).toString(16).padStart(2, '0');
      const b = Number(match[3]).toString(16).padStart(2, '0');
      return `#${r}${g}${b}`;
    }

    function cleanupBrokenOrStaleImages() {
      const images = document.querySelectorAll('img');
      images.forEach((img) => {
        const src = img.getAttribute('src') || '';
        if (img.complete && img.naturalWidth === 0) {
          img.remove();
        }
      });
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(typeof reader.result === 'string' ? reader.result : '');
        reader.onerror = () => resolve('');
        reader.readAsDataURL(file);
      });
    }

    function setupGlobalImageErrorCleanup() {
      document.addEventListener(
        'error',
        (event) => {
          const target = event.target;
          if (target && target.tagName === 'IMG') {
            target.remove();
          }
        },
        true
      );
    }

    function init() {
      loadProject();
      reacquireRefsAfterLoad();
      cleanupBrokenOrStaleImages();
      toggleFix('header');
      toggleFix('footer');
      updateThemeColorFromHeader();
      updateScrollHostMode();
      setupButtons();
      setupEventDelegation();
      setupPullToRefreshForBody();
      setupGlobalImageErrorCleanup();
      setupPrivacyBlurForAppSwitcher();
      updateBodyPadding();
      document.getElementById('sheet-backdrop').addEventListener('click', closeBottomSheet);
    }

    init();
    window.addEventListener('beforeunload', saveProject);
    window.addEventListener('resize', updateBodyPadding);
  </script>
</body>
</html>
