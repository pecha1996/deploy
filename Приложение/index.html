<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Моё приложение</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background-color: #000;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header и Footer фиксируем */
    #headerBlock, #footerBlock {
      position: fixed;
      width: 100%;
      left: 0;
      z-index: 10;
      cursor: pointer;
    }

    #headerBlock { top: 0; }
    #footerBlock { bottom: 0; }

    /* Body занимает оставшееся пространство между header и footer */
    #bodyBlock {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 100%;
      overflow-y: auto;
      margin-top: 0;
      margin-bottom: 0;
    }

    .preview-img {
      width: 100%;
      height: auto;
      display: block;
    }

    input[type="file"] { display: none; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="block" id="headerBlock">
    <img id="headerPreview" class="preview-img" alt="Header Фото">
    <input type="file" id="headerUpload" accept="image/*">
  </div>

  <!-- BODY -->
  <div class="block" id="bodyBlock">
    <img id="bodyPreview" class="preview-img" alt="Body Фото">
    <input type="file" id="bodyUpload" accept="image/*">
  </div>

  <!-- FOOTER -->
  <div class="block" id="footerBlock">
    <img id="footerPreview" class="preview-img" alt="Footer Фото">
    <input type="file" id="footerUpload" accept="image/*">
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log('Service Worker registered'));
    }

    function setupUpload(blockId, inputId, previewId, fixed=false) {
      const block = document.getElementById(blockId);
      const input = document.getElementById(inputId);
      const preview = document.getElementById(previewId);

      // Клик по блоку открывает выбор изображения
      block.addEventListener('click', () => input.click());

      input.addEventListener('change', () => {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          preview.src = e.target.result;
        };
        reader.readAsDataURL(file);

        preview.onload = () => {
          const aspectRatio = preview.naturalHeight / preview.naturalWidth;
          const width = block.clientWidth;
          const height = width * aspectRatio;
          block.style.height = height + 'px';

          if(blockId === 'headerBlock') {
            document.getElementById('bodyBlock').style.top = height + 'px';
          }
          if(blockId === 'footerBlock') {
            document.getElementById('bodyBlock').style.bottom = height + 'px';
          }
        };
      });
    }

    setupUpload('headerBlock', 'headerUpload', 'headerPreview');
    setupUpload('bodyBlock', 'bodyUpload', 'bodyPreview');
    setupUpload('footerBlock', 'footerUpload', 'footerPreview');
  </script>
</body>
</html>
