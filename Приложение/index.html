<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  background: #0b0b0b;
  color: white;
  font-family: -apple-system, Arial;
}

/* TOP */
.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px;
  background: rgba(10,10,10,0.9);
  backdrop-filter: blur(10px);
  z-index: 100;
}

.profile {
  font-size: 20px;
  font-weight: bold;
}

/* CONTENT */
.content {
  padding: 80px 15px 90px;
}

/* CARD */
.card {
  background: #1a1a1a;
  border-radius: 20px;
  padding: 15px;
  margin-bottom: 15px;
}

/* HORIZONTAL SCROLL */
.scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
}

.small-card {
  min-width: 220px;
  background: #1a1a1a;
  border-radius: 20px;
  padding: 15px;
}

/* CRYPTO */
.crypto {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.crypto-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: orange;
}

/* BUTTON */
.main-btn {
  width: 100%;
  padding: 15px;
  border-radius: 15px;
  border: none;
  background: #a78bfa;
  color: black;
  font-weight: bold;
}

/* ACTIONS */
.actions {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.action {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 15px;
  text-align: center;
  width: 23%;
}

/* NAVBAR */
.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 70px;
  background: rgba(10,10,10,0.9);
  display: flex;
  justify-content: space-around;
  align-items: center;
}

</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <div class="profile">@ceo00000001</div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- WALLET -->
  <div class="card crypto">
    <div class="crypto-left">
      <div class="icon"></div>
      <div>
        <b>Bitcoin</b><br>
        <span style="opacity:0.5;">0 BTC</span>
      </div>
    </div>
    <div>
      $0.00<br>
      <span style="opacity:0.5;">$0.00</span>
    </div>
  </div>

  <!-- PREDICTIONS -->
  <h3>Прогнозы</h3>

  <div class="scroll">
    <div class="small-card">Ethereum price</div>
    <div class="small-card">BTC price</div>
  </div>

  <!-- BUTTON -->
  <div class="card">
    <h2>Ваш кошелек готов</h2>
    <button class="main-btn">Купить SOL</button>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <div class="action">📤</div>
    <div class="action">🔄</div>
    <div class="action">📥</div>
    <div class="action">💲</div>
  </div>

</div>

<!-- NAV -->
<div class="navbar">
  <div>🏠</div>
  <div>💳</div>
  <div>🔄</div>
  <div>💬</div>
  <div>🔍</div>
</div>

</body>
</html>
