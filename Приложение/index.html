<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Конструктор приложений</title>
  <meta name="theme-color" content="#222" id="themeColorMeta" />
  <link rel="icon" id="appFavicon" href="icon.png" type="image/png" />
  <link rel="manifest" id="appManifest" href="manifest.json" />
  <link rel="apple-touch-icon" id="appTouchIcon" href="icon.png" />
  <style>
    :root {
      --panel-bg: rgba(0, 0, 0, 0.72);
      --surface: #222;
      --text: #fff;
      --body-bg: #111;
      --danger: #ff5c5c;
      --muted: #aaaaaa;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--body-bg);
      color: var(--text);
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100dvh;
      min-height: 100dvh;
      overflow: hidden;
      transition: filter 0.2s ease;
      will-change: filter;
    }

    body.app-obscured #app {
      filter: blur(14px) brightness(0.55);
      pointer-events: none;
      user-select: none;
    }

    .block {
      width: 100%;
      margin: 0;
      padding: 0;
      position: relative;
    }

    #header,
    #footer {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      width: 100%;
      overflow: hidden;
      background: transparent;
      min-height: 0;
      padding: 0;
      border: none;
      z-index: 20;
    }

    #header:not(:empty),
    #footer:not(:empty) {
      min-height: 56px;
      background: var(--surface);
    }

    #header.fixed {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 9999;
    }

    #footer.fixed {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 9999;
    }

    #header.has-image,
    #footer.has-image {
      color: transparent;
      font-size: 0;
      line-height: 0;
      min-height: 0;
    }

    #body {
      flex: 1 1 auto;
      overflow-y: auto;
      overflow-x: hidden;
      width: 100%;
      min-height: 0;
      padding-top: 0;
      padding-bottom: 0;
    }

    .block img {
      width: 100%;
      max-width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
      border: none;
      margin: 0;
      padding: 0;
      vertical-align: top;
    }

    .block textarea {
      width: 100%;
      min-height: 110px;
      background: #333;
      color: #fff;
      border: none;
      padding: 10px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 15px;
    }

    .code-actions {
      display: flex;
      gap: 8px;
      padding: 0;
    }

    .code-actions button {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      background: #444;
      color: #fff;
      cursor: pointer;
    }

    .code-actions button.execute {
      background: #2f7d32;
    }

    .code-actions button.clear {
      background: var(--danger);
    }

    .executed-code {
      width: 100%;
      max-width: 100%;
      overflow-x: auto;
      background: transparent;
    }

    .executed-frame,
    .section-frame,
    .horizontal-code-frame {
      width: 100%;
      border: none;
      display: block;
      background: transparent;
    }

    .section-frame {
      min-height: 56px;
    }

    .body-block {
      border: none;
      margin: 0;
      padding: 0;
    }

    .media-block {
      line-height: 0;
    }

    .horizontal-scroll {
      display: flex;
      align-items: flex-start;
      overflow-x: auto;
      overflow-y: hidden;
      gap: 0;
      scrollbar-width: none;
      -ms-overflow-style: none;
      touch-action: pan-x pan-y;
    }

    .horizontal-scroll::-webkit-scrollbar {
      display: none;
    }

    .horizontal-item {
      flex: 0 0 auto;
      display: block;
    }

    .horizontal-scroll img.horizontal-item {
      width: auto !important;
      max-width: none !important;
      height: auto !important;
      object-fit: contain !important;
    }

    .horizontal-code-item {
      flex: 0 0 90vw;
      width: 90vw;
      max-width: 90vw;
      min-height: 140px;
      border-right: 1px solid #2d2d2d;
      background: #171717;
    }

    #control-panel {
      position: fixed;
      right: 10px;
      top: max(10px, env(safe-area-inset-top));
      background: var(--panel-bg);
      backdrop-filter: blur(8px);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10000;
      border-radius: 8px;
      max-width: min(92vw, 360px);
      max-height: calc(100dvh - 20px);
      overflow: auto;
    }

    #control-panel.hidden {
      transform: translateX(120%);
    }

    #control-panel button {
      padding: 8px 10px;
      cursor: pointer;
      border-radius: 6px;
      border: 1px solid #666;
      background: #2f2f2f;
      color: #fff;
      text-align: left;
    }

    #control-panel label {
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .top-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .links-box {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
      word-break: break-all;
    }

    .links-box button {
      font-size: 12px;
      padding: 6px 8px;
      text-align: left;
    }

    .links-title {
      color: #fff;
      font-size: 13px;
      font-weight: 700;
    }

    #sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 14000;
    }

    #sheet-backdrop.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #bottom-sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      max-height: 70vh;
      transform: translateY(105%);
      transition: transform 0.22s ease;
      background: #111;
      color: #fff;
      overflow-y: auto;
      z-index: 15000;
      padding: 14px;
      border-top-left-radius: 14px;
      border-top-right-radius: 14px;
    }

    #bottom-sheet.visible {
      transform: translateY(0);
    }

    #toast {
      position: fixed;
      left: 50%;
      bottom: max(16px, env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(12px);
      background: rgba(20, 20, 20, 0.92);
      color: #fff;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 20000;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
    }

    #toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div id="sheet-backdrop"></div>
  <div id="bottom-sheet"></div>
  <div id="toast"></div>

  <div id="app">
    <div id="header" class="block"></div>
    <div id="body" class="block-container"></div>
    <div id="footer" class="block"></div>
  </div>

  <div id="control-panel">
    <div class="top-actions">
      <button type="button" id="add-header-image">Фото в header</button>
      <button type="button" id="add-footer-image">Фото в footer</button>
      <button type="button" id="add-header-code">Код в header</button>
      <button type="button" id="add-footer-code">Код в footer</button>
    </div>

    <div class="menu-grid">
      <button type="button" id="set-app-title">Название приложения</button>
      <button type="button" id="set-app-icon">Загрузить иконку</button>
      <button type="button" id="add-image">Добавить фото в body</button>
      <button type="button" id="add-code">Добавить код в body</button>
      <button type="button" id="add-horizontal-image">Фото в горизонтальный блок</button>
      <button type="button" id="add-horizontal-code">Код в горизонтальный блок</button>
      <button type="button" id="add-button-zone">Зона-кнопка</button>
      <button type="button" id="set-header-color">Цвет header</button>
      <button type="button" id="create-screen">Создать новый экран</button>
      <button type="button" id="copy-current-link">Скопировать ссылку экрана</button>
      <button type="button" id="share-link">Создать ссылку</button>
      <button type="button" id="toggle-panel">Скрыть меню</button>
      <button type="button" id="save-now">Сохранить</button>
      <button type="button" id="reset-layout">Сбросить проект</button>
    </div>

    <label><input type="checkbox" id="fix-header" /> Закрепить header</label>
    <label><input type="checkbox" id="fix-footer" /> Закрепить footer</label>
    <label><input type="checkbox" id="enable-privacy-blur" checked /> Блюр в фоне</label>

    <div class="links-box" id="screen-links"></div>
  </div>

  <script>
    const STORAGE_KEY = 'appScreensV1';
    const LEGACY_KEY = 'appLayoutV2';

    const app = document.getElementById('app');
    const themeMeta = document.getElementById('themeColorMeta');
    const faviconEl = document.getElementById('appFavicon');
    const manifestEl = document.getElementById('appManifest');
    const touchIconEl = document.getElementById('appTouchIcon');
    const fixHeader = document.getElementById('fix-header');
    const fixFooter = document.getElementById('fix-footer');
    const blurToggle = document.getElementById('enable-privacy-blur');
    const linksBox = document.getElementById('screen-links');
    const panelEl = document.getElementById('control-panel');

    let bodyEl;
    let headerEl;
    let footerEl;
    let sectionResizeObserver;
    let lastTapTime = 0;
    let manifestUrl = '';
    let currentIconLarge = 'icon.png';
    let currentIconSmall = 'icon.png';
    let toastTimer;

    const initialAppMarkup = app.innerHTML;
    let currentScreenId = 'main';
    let screensState = {};

    function defaultScreenState() {
      return {
        appMarkup: initialAppMarkup,
        fixHeader: false,
        fixFooter: false,
        blurEnabled: true,
        appIcon: 'icon.png',
        appIconSmall: 'icon.png',
        appTitle: 'Конструктор приложений',
      };
    }

    function parseScreenIdFromHash() {
      const hash = (location.hash || '').replace(/^#/, '');
      if (!hash) return 'main';
      const params = new URLSearchParams(hash);
      const raw = params.get('screen') || 'main';
      const clean = String(raw).trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');
      return clean || 'main';
    }

    function setScreenHash(screenId, replace = false) {
      const nextHash = '#screen=' + encodeURIComponent(screenId);
      if (replace) {
        history.replaceState(null, '', nextHash);
      } else {
        location.hash = nextHash;
      }
    }

    function encodeStateToHash(state) {
      try {
        const json = JSON.stringify(state || {});
        return btoa(unescape(encodeURIComponent(json)));
      } catch {
        return '';
      }
    }

    function decodeStateFromHash(encoded) {
      try {
        const json = decodeURIComponent(escape(atob(encoded)));
        return JSON.parse(json);
      } catch {
        return null;
      }
    }

    function buildScreenUrl(screenId) {
      return location.origin + location.pathname + '#screen=' + encodeURIComponent(screenId);
    }

    function buildShareUrl(screenId, state) {
      const payload = encodeStateToHash(state);
      const hash = '#screen=' + encodeURIComponent(screenId) + (payload ? '&app=' + encodeURIComponent(payload) : '');
      return location.origin + location.pathname + hash;
    }

    function normalizeTarget(target) {
      if (target === headerEl || target === footerEl || target === bodyEl) return target;
      return bodyEl;
    }

    function clearSectionClasses(sectionEl) {
      sectionEl.classList.remove('has-image');
      sectionEl.classList.remove('has-code');
    }

    function ensureScreenExists(screenId) {
      if (!screensState[screenId]) {
        screensState[screenId] = defaultScreenState();
      }
    }

    function updateThemeColorFromHeader() {
      const computedColor = window.getComputedStyle(headerEl).backgroundColor;
      themeMeta.setAttribute('content', computedColor || '#222');
    }

    function updateManifestFromState(state) {
      if (!manifestEl) return;
      const safe = state || snapshotCurrentState();
      const iconSrc = safe.appIcon || 'icon.png';
      const iconSmall = safe.appIconSmall || iconSrc;
      const manifest = {
        name: safe.appTitle || 'Конструктор приложений',
        short_name: safe.appTitle || 'Конструктор приложений',
        start_url: location.pathname + location.hash,
        display: 'standalone',
        background_color: '#000000',
        theme_color: themeMeta.getAttribute('content') || '#000000',
        icons: [
          {
            src: iconSmall,
            sizes: '192x192',
            type: 'image/png',
          },
          {
            src: iconSrc,
            sizes: '512x512',
            type: 'image/png',
          },
        ],
      };
      try {
        const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
        if (manifestUrl) URL.revokeObjectURL(manifestUrl);
        manifestUrl = URL.createObjectURL(blob);
        manifestEl.href = manifestUrl;
        if (touchIconEl) {
          touchIconEl.href = iconSmall;
        }
      } catch {
        // noop
      }
    }

    function showToast(message, duration = 1600) {
      const toast = document.getElementById('toast');
      if (!toast) return;
      toast.textContent = message;
      toast.classList.add('visible');
      if (toastTimer) window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => {
        toast.classList.remove('visible');
      }, duration);
    }

    function resizeImageDataUrl(dataUrl, size) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');
          if (!ctx) {
            resolve(dataUrl);
            return;
          }
          ctx.clearRect(0, 0, size, size);
          ctx.drawImage(img, 0, 0, size, size);
          try {
            resolve(canvas.toDataURL('image/png'));
          } catch {
            resolve(dataUrl);
          }
        };
        img.onerror = () => resolve(dataUrl);
        img.src = dataUrl;
      });
    }

    function applyAppIcon(iconLarge, iconSmall) {
      currentIconLarge = iconLarge || 'icon.png';
      currentIconSmall = iconSmall || currentIconLarge;
      if (faviconEl) {
        faviconEl.href = currentIconSmall;
        faviconEl.type = 'image/png';
      }
      if (touchIconEl) {
        touchIconEl.href = currentIconSmall;
      }
      updateManifestFromState(snapshotCurrentState());
    }


    function updateBodyPadding() {
      const headerHeight = headerEl.offsetHeight;
      const footerHeight = footerEl.offsetHeight;
      bodyEl.style.paddingTop = fixHeader.checked ? headerHeight + 'px' : '0';
      bodyEl.style.paddingBottom = fixFooter.checked ? footerHeight + 'px' : '0';
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(typeof reader.result === 'string' ? reader.result : '');
        reader.onerror = () => resolve('');
        reader.readAsDataURL(file);
      });
    }

    function createFrameFromCode(code, className = 'executed-frame', minHeight = 120) {
      const frame = document.createElement('iframe');
      frame.className = className;
      frame.sandbox = 'allow-scripts allow-same-origin';
      frame.srcdoc = code;
      frame.onload = () => {
        try {
          const doc = frame.contentDocument;
          const h = Math.max(doc?.documentElement?.scrollHeight || 0, doc?.body?.scrollHeight || 0, minHeight);
          frame.style.height = h + 'px';
        } catch {
          frame.style.height = minHeight + 'px';
        }
        if (className === 'section-frame') {
          updateBodyPadding();
          updateThemeColorFromHeader();
          saveProject();
        }
      };
      return frame;
    }

    function executeCodeFromTextArea(textarea, outputRoot) {
      const code = textarea.value;
      outputRoot.innerHTML = '';
      if (!code.trim()) return;

      const codeBlock = document.createElement('div');
      codeBlock.classList.add('executed-code');
      codeBlock.appendChild(createFrameFromCode(code, 'executed-frame', 120));
      outputRoot.appendChild(codeBlock);
    }
    function setSectionCode(target) {
      const sectionEl = normalizeTarget(target);
      if (sectionEl === bodyEl) {
        alert('Код секции доступен только для header/footer.');
        return;
      }

      const html = prompt('Вставьте HTML/JS для секции', '<div style="padding:12px;">Содержимое секции</div>');
      if (!html || !html.trim()) return;

      sectionEl.innerHTML = '';
      clearSectionClasses(sectionEl);
      sectionEl.classList.add('has-code');
      sectionEl.appendChild(createFrameFromCode(html, 'section-frame', 56));

      updateBodyPadding();
      updateThemeColorFromHeader();
      saveProject();
    }

    function addImageBlock(target) {
      target = normalizeTarget(target);
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'image/*';

      fileInput.onchange = async (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        const dataUrl = await readFileAsDataUrl(file);
        if (!dataUrl) return;

        const img = document.createElement('img');
        img.src = dataUrl;
        img.alt = '';
        img.style.visibility = 'hidden';
        img.onerror = () => img.remove();

        if (target === headerEl || target === footerEl) {
          target.innerHTML = '';
          clearSectionClasses(target);
          target.classList.add('has-image');
          target.appendChild(img);
          img.onload = () => {
            img.style.visibility = 'visible';
            updateBodyPadding();
            updateThemeColorFromHeader();
            saveProject();
          };
          return;
        }

        const block = document.createElement('div');
        block.className = 'block body-block media-block';
        block.appendChild(img);
        bodyEl.appendChild(block);
        img.onload = () => {
          img.style.visibility = 'visible';
          saveProject();
        };
      };

      fileInput.click();
    }

    function addCodeBlock(target) {
      target = normalizeTarget(target);
      if (target !== bodyEl) {
        alert('Код-блок можно добавить только в body.');
        return;
      }

      const block = document.createElement('div');
      block.className = 'block body-block';

      const textarea = document.createElement('textarea');
      textarea.placeholder = 'Вставьте HTML/JS код';
      block.appendChild(textarea);

      const actions = document.createElement('div');
      actions.className = 'code-actions';

      const executeBtn = document.createElement('button');
      executeBtn.className = 'execute';
      executeBtn.type = 'button';
      executeBtn.textContent = 'Выполнить код';

      const clearBtn = document.createElement('button');
      clearBtn.className = 'clear';
      clearBtn.type = 'button';
      clearBtn.textContent = 'Очистить результат';

      const outputRoot = document.createElement('div');

      executeBtn.addEventListener('click', () => {
        executeCodeFromTextArea(textarea, outputRoot);
        saveProject();
      });

      clearBtn.addEventListener('click', () => {
        outputRoot.innerHTML = '';
        saveProject();
      });

      actions.appendChild(executeBtn);
      actions.appendChild(clearBtn);

      block.appendChild(actions);
      block.appendChild(outputRoot);
      bodyEl.appendChild(block);
      saveProject();
    }

    function addHorizontalCodeItem(container) {
      const code = prompt('HTML/JS для горизонтального элемента', '<div style="padding:12px">Контент</div>');
      if (!code || !code.trim()) return;

      const holder = document.createElement('div');
      holder.className = 'horizontal-code-item';
      holder.appendChild(createFrameFromCode(code, 'horizontal-code-frame', 140));
      container.appendChild(holder);
    }

    function addHorizontalScrollBlock(target, forcedMode) {
      target = normalizeTarget(target);
      if (target !== bodyEl) {
        alert('Горизонтальный блок можно добавить только в body.');
        return;
      }

      const mode = (forcedMode || prompt('Тип блока: image / code', 'image') || 'image').toLowerCase().trim();
      const block = document.createElement('div');
      block.className = 'block body-block media-block horizontal-scroll';

      if (mode === 'code') {
        const countRaw = prompt('Сколько горизонтальных код-элементов?', '2');
        const count = Math.max(1, Math.min(10, Number.parseInt(countRaw || '1', 10) || 1));
        for (let i = 0; i < count; i += 1) {
          addHorizontalCodeItem(block);
        }
        if (!block.children.length) return;
        bodyEl.appendChild(block);
        saveProject();
        return;
      }

      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'image/*';
      fileInput.multiple = true;

      fileInput.onchange = async (e) => {
        const files = Array.from(e.target.files || []);
        if (!files.length) return;

        for (const file of files) {
          const dataUrl = await readFileAsDataUrl(file);
          if (!dataUrl) continue;

          const img = document.createElement('img');
          img.className = 'horizontal-item';
          img.src = dataUrl;
          img.alt = '';
          img.style.visibility = 'hidden';
          img.onerror = () => img.remove();

          img.onload = () => {
            const dpr = window.devicePixelRatio || 1;
            const displayWidth = Math.max(1, Math.round(img.naturalWidth / dpr));
            const displayHeight = Math.max(1, Math.round(img.naturalHeight / dpr));
            img.style.width = displayWidth + 'px';
            img.style.height = displayHeight + 'px';
            img.style.visibility = 'visible';
            saveProject();
          };

          block.appendChild(img);
        }

        if (block.children.length) {
          bodyEl.appendChild(block);
          saveProject();
        }
      };

      fileInput.click();
    }

    function addHorizontalImageBlock(target) {
      addHorizontalScrollBlock(target, 'image');
    }

    function addHorizontalCodeBlock(target) {
      addHorizontalScrollBlock(target, 'code');
    }

    function addButtonZoneBlock(target) {
      target = normalizeTarget(target);
      if (target !== bodyEl) {
        alert('Зона-кнопка добавляется только в body.');
        return;
      }

      const block = document.createElement('div');
      block.className = 'block body-block';

      const button = document.createElement('button');
      button.type = 'button';
      button.textContent = prompt('Текст кнопки?', 'Открыть') || 'Открыть';
      button.style.width = '100%';
      button.style.padding = '22px 14px';
      button.style.border = 'none';
      button.style.background = '#2c2c2c';
      button.style.color = '#fff';

      const actionType = prompt('Тип действия: url / sheet / screen', 'url');
      if ((actionType || '').toLowerCase() === 'screen') {
        const screenId = prompt('ID экрана для открытия', 'screen2') || '';
        if (!screenId) return;
        const mode = (prompt('Открыть как: new / sheet', 'sheet') || 'sheet').toLowerCase().trim();
        if (mode === 'new') {
          const url = buildScreenUrl(screenId);
          button.addEventListener('click', () => window.open(url, '_blank', 'noopener,noreferrer'));
        } else {
          const offsetRaw = prompt('Отступ сверху (px)', '120');
          const offset = Math.max(0, Math.min(600, Number.parseInt(offsetRaw || '120', 10) || 0));
          button.addEventListener('click', () => openScreenSheet(screenId, offset));
        }
      } else if ((actionType || '').toLowerCase() === 'sheet') {
        const sheetHtml = prompt('HTML контент для нижнего окна', '<h3>Нижнее окно</h3><p>Ваш контент</p>') || '';
        button.addEventListener('click', () => openBottomSheet(sheetHtml));
      } else {
        const targetUrl = prompt('URL для открытия (можно пусто)', 'https://');
        if (targetUrl && targetUrl !== 'https://') {
          button.addEventListener('click', () => window.open(targetUrl, '_blank', 'noopener,noreferrer'));
        } else {
          const message = prompt('Текст действия', 'Нажата зона-кнопка') || 'Нажата зона-кнопка';
          button.addEventListener('click', () => alert(message));
        }
      }

      block.appendChild(button);
      bodyEl.appendChild(block);
      saveProject();
    }

    function createImageSlotBlock(label) {
      const block = document.createElement('div');
      block.className = 'block body-block';

      const slotBtn = document.createElement('button');
      slotBtn.type = 'button';
      slotBtn.textContent = label || 'Добавить фото';
      slotBtn.style.width = '100%';
      slotBtn.style.padding = '26px 14px';
      slotBtn.style.border = 'none';
      slotBtn.style.background = '#242424';
      slotBtn.style.color = '#fff';

      slotBtn.addEventListener('click', () => {
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'image/*';
        fileInput.multiple = true;

        fileInput.onchange = async (e) => {
          const files = Array.from(e.target.files || []);
          if (!files.length) return;

          block.innerHTML = '';
          if (files.length > 1) {
            block.classList.add('horizontal-scroll', 'media-block');
          } else {
            block.classList.add('media-block');
            block.classList.remove('horizontal-scroll');
          }

          for (const file of files) {
            const dataUrl = await readFileAsDataUrl(file);
            if (!dataUrl) continue;
            const img = document.createElement('img');
            img.src = dataUrl;
            img.alt = '';
            img.style.visibility = 'hidden';
            img.onload = () => {
              img.style.visibility = 'visible';
              saveProject();
            };
            img.onerror = () => img.remove();
            block.appendChild(img);
          }

          saveProject();
        };

        fileInput.click();
      });

      block.appendChild(slotBtn);
      return block;
    }

    function openBottomSheet(html) {
      const backdrop = document.getElementById('sheet-backdrop');
      const sheet = document.getElementById('bottom-sheet');
      sheet.style.top = '';
      sheet.style.height = '';
      sheet.style.maxHeight = '';
      sheet.innerHTML = html;
      backdrop.classList.add('visible');
      sheet.classList.add('visible');
    }

    function openScreenSheet(screenId, topOffset) {
      const backdrop = document.getElementById('sheet-backdrop');
      const sheet = document.getElementById('bottom-sheet');
      const url = buildScreenUrl(screenId);
      const frame = document.createElement('iframe');
      frame.className = 'section-frame';
      frame.style.width = '100%';
      frame.style.border = 'none';
      frame.src = url;
      sheet.innerHTML = '';
      sheet.style.top = Math.max(0, topOffset) + 'px';
      sheet.style.height = 'calc(100vh - ' + Math.max(0, topOffset) + 'px)';
      sheet.style.maxHeight = 'none';
      sheet.appendChild(frame);
      backdrop.classList.add('visible');
      sheet.classList.add('visible');
    }

    function closeBottomSheet() {
      const backdrop = document.getElementById('sheet-backdrop');
      const sheet = document.getElementById('bottom-sheet');
      backdrop.classList.remove('visible');
      sheet.classList.remove('visible');
    }

    function setupPrivacyBlurForAppSwitcher() {
      const obscure = () => {
        if (blurToggle.checked) document.body.classList.add('app-obscured');
      };
      const reveal = () => document.body.classList.remove('app-obscured');

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') obscure();
        if (document.visibilityState === 'visible') reveal();
      });

      window.addEventListener('blur', obscure);
      window.addEventListener('focus', reveal);
      window.addEventListener('pagehide', obscure);
      window.addEventListener('pageshow', reveal);
    }

    function setupGlobalImageErrorCleanup() {
      document.addEventListener(
        'error',
        (event) => {
          const target = event.target;
          if (target && target.tagName === 'IMG') {
            target.remove();
          }
        },
        true
      );
    }
    function setupSectionResizeObserver() {
      if (typeof ResizeObserver === 'undefined') return;
      if (sectionResizeObserver) {
        sectionResizeObserver.disconnect();
      }
      sectionResizeObserver = new ResizeObserver(() => {
        updateBodyPadding();
        updateThemeColorFromHeader();
      });
      sectionResizeObserver.observe(headerEl);
      sectionResizeObserver.observe(footerEl);
    }

    function setupPullToRefreshForBody() {
      let startX = 0;
      let startY = 0;
      let pulling = false;
      let triggered = false;
      const threshold = 80;

      const onStart = (event) => {
        if (!bodyEl) return;
        if (!event.touches || event.touches.length !== 1) return;
        if (bodyEl.scrollTop > 0) return;
        const touch = event.touches[0];
        startX = touch.clientX;
        startY = touch.clientY;
        pulling = true;
        triggered = false;
      };

      const onMove = (event) => {
        if (!pulling || !event.touches || event.touches.length !== 1) return;
        const touch = event.touches[0];
        const dx = touch.clientX - startX;
        const dy = touch.clientY - startY;
        if (dy <= 0) {
          pulling = false;
          return;
        }
        if (Math.abs(dx) > Math.abs(dy)) {
          pulling = false;
          return;
        }
        if (dy > threshold) {
          triggered = true;
        }
      };

      const onEnd = () => {
        if (pulling && triggered) {
          runRefresh();
        }
        pulling = false;
        triggered = false;
      };

      bodyEl.addEventListener('touchstart', onStart, { passive: true });
      bodyEl.addEventListener('touchmove', onMove, { passive: true });
      bodyEl.addEventListener('touchend', onEnd);
      bodyEl.addEventListener('touchcancel', onEnd);
    }

    function toggleFix(section) {
      const el = document.getElementById(section);
      const isChecked = document.getElementById('fix-' + section).checked;
      if (isChecked) {
        el.classList.add('fixed');
      } else {
        el.classList.remove('fixed');
      }
      updateBodyPadding();
      updateThemeColorFromHeader();
      saveProject();
    }

    function snapshotCurrentState() {
      return {
        appMarkup: app.innerHTML,
        fixHeader: fixHeader.checked,
        fixFooter: fixFooter.checked,
        blurEnabled: blurToggle.checked,
        appIcon: currentIconLarge || faviconEl?.getAttribute('href') || '',
        appIconSmall: currentIconSmall || faviconEl?.getAttribute('href') || '',
        appTitle: document.title || 'Конструктор приложений',
      };
    }

    function saveAllScreens() {
      localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify({
          screens: screensState,
        })
      );
    }

    function saveProject() {
      ensureScreenExists(currentScreenId);
      screensState[currentScreenId] = snapshotCurrentState();
      saveAllScreens();
      renderScreenLinks();
      updateManifestFromState(screensState[currentScreenId]);
    }

    function applyScreenState(state) {
      const safe = state || defaultScreenState();
      app.innerHTML = safe.appMarkup || initialAppMarkup;
      reacquireRefsAfterLoad();

      fixHeader.checked = Boolean(safe.fixHeader);
      fixFooter.checked = Boolean(safe.fixFooter);
      blurToggle.checked = safe.blurEnabled !== false;

      if (safe.appIcon && faviconEl) {
        applyAppIcon(safe.appIcon, safe.appIconSmall || safe.appIcon);
      }

      document.title = safe.appTitle || 'Конструктор приложений';

      toggleFix('header');
      toggleFix('footer');
      updateThemeColorFromHeader();
      updateBodyPadding();
      updateManifestFromState(safe);
    }

    function migrateLegacyIfNeeded() {
      const raw = localStorage.getItem(LEGACY_KEY);
      if (!raw) return;

      try {
        const legacy = JSON.parse(raw);
        if (legacy && typeof legacy === 'object') {
          screensState.main = {
            appMarkup: legacy.appMarkup || initialAppMarkup,
            fixHeader: Boolean(legacy.fixHeader),
            fixFooter: Boolean(legacy.fixFooter),
            blurEnabled: legacy.blurEnabled !== false,
            appIcon: legacy.appIcon || 'icon.png',
            appIconSmall: legacy.appIcon || 'icon.png',
            appTitle: document.title || 'Конструктор приложений',
          };
          saveAllScreens();
          localStorage.removeItem(LEGACY_KEY);
        }
      } catch {
        localStorage.removeItem(LEGACY_KEY);
      }
    }

    function loadScreensFromStorage() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;

      try {
        const parsed = JSON.parse(raw);
        const screens = parsed && parsed.screens;
        if (screens && typeof screens === 'object') {
          screensState = screens;
        }
      } catch {
        screensState = {};
      }
    }

    function loadProjectForCurrentScreen() {
      ensureScreenExists(currentScreenId);
      applyScreenState(screensState[currentScreenId]);
    }

    function createSecondScreen() {
      const rawId = prompt('ID нового экрана (латиница/цифры)', 'screen2') || 'screen2';
      const screenId = rawId.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');
      if (!screenId) {
        alert('Некорректный ID экрана.');
        return;
      }

      if (!screensState[screenId]) {
        const base = defaultScreenState();
        base.appTitle = 'Экран: ' + screenId;
        screensState[screenId] = base;
      }

      saveAllScreens();
      setScreenHash(screenId);
    }

    async function copyTextToClipboard(text) {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
          return true;
        }
      } catch {
        // noop
      }
      return false;
    }

    function getShareState() {
      const state = snapshotCurrentState();
      return {
        appIcon: state.appIcon || '',
        appIconSmall: state.appIconSmall || state.appIcon || '',
        appTitle: state.appTitle || '',
      };
    }

    function applyIncomingShare(incoming) {
      if (!incoming || typeof incoming !== 'object') return;
      ensureScreenExists(currentScreenId);
      const current = screensState[currentScreenId];
      const next = {
        ...current,
        appIcon: typeof incoming.appIcon === 'string' ? incoming.appIcon : current.appIcon,
        appIconSmall:
          typeof incoming.appIconSmall === 'string'
            ? incoming.appIconSmall
            : current.appIconSmall || current.appIcon,
        appTitle: typeof incoming.appTitle === 'string' ? incoming.appTitle : current.appTitle,
      };
      screensState[currentScreenId] = next;
      applyScreenState(next);
      saveProject();
    }

    async function copyCurrentScreenLink() {
      saveProject();
      const url = buildShareUrl(currentScreenId, getShareState());
      const ok = await copyTextToClipboard(url);
      if (!ok) {
        prompt('Ссылка экрана:', url);
        showToast('Ссылка готова');
        return;
      }
      showToast('Ссылка скопирована');
    }

    function renderScreenLinks() {
      const ids = Object.keys(screensState).sort((a, b) =>
        a === 'main' ? -1 : b === 'main' ? 1 : a.localeCompare(b)
      );

      linksBox.innerHTML = '';
      const title = document.createElement('div');
      title.className = 'links-title';
      title.textContent = 'Ссылки экранов';
      linksBox.appendChild(title);

      ids.forEach((id) => {
        const row = document.createElement('button');
        row.type = 'button';
        const mark = id === currentScreenId ? ' (текущий)' : '';
        const shareState = {
          appIcon: (screensState[id] && screensState[id].appIcon) || '',
          appIconSmall: (screensState[id] && screensState[id].appIconSmall) || '',
          appTitle: (screensState[id] && screensState[id].appTitle) || '',
        };
        row.textContent = 'Экран: ' + id + mark;
        row.addEventListener('click', async () => {
          const url = buildShareUrl(id, shareState);
          const ok = await copyTextToClipboard(url);
          if (!ok) {
            prompt('Ссылка экрана:', url);
            showToast('Ссылка готова');
            return;
          }
          showToast('Ссылка скопирована');
        });
        linksBox.appendChild(row);
      });
    }

    function reacquireRefsAfterLoad() {
      headerEl = document.getElementById('header');
      bodyEl = document.getElementById('body');
      footerEl = document.getElementById('footer');

      if (!headerEl || !bodyEl || !footerEl) {
        location.reload();
      }
    }

    function runRefresh() {
      saveProject();
      window.location.reload();
    }

    function setupButtons() {
      document.getElementById('add-header-image').addEventListener('click', () => addImageBlock(headerEl));
      document.getElementById('add-footer-image').addEventListener('click', () => addImageBlock(footerEl));
      document.getElementById('add-header-code').addEventListener('click', () => setSectionCode(headerEl));
      document.getElementById('add-footer-code').addEventListener('click', () => setSectionCode(footerEl));
      document.getElementById('add-image').addEventListener('click', () => addImageBlock(bodyEl));
      document.getElementById('add-code').addEventListener('click', () => addCodeBlock(bodyEl));
      document.getElementById('add-horizontal-image').addEventListener('click', () => addHorizontalImageBlock(bodyEl));
      document.getElementById('add-horizontal-code').addEventListener('click', () => addHorizontalCodeBlock(bodyEl));
      document.getElementById('add-button-zone').addEventListener('click', () => addButtonZoneBlock(bodyEl));

      document.getElementById('set-app-title').addEventListener('click', () => {
        const title = prompt('Введите название приложения', document.title || 'Конструктор приложений');
        if (!title) return;
        document.title = title;
        updateManifestFromState(snapshotCurrentState());
        saveProject();
      });

      document.getElementById('set-header-color').addEventListener('click', () => {
        const input = prompt('Введите цвет header (например #223344)', window.getComputedStyle(headerEl).backgroundColor);
        if (!input) return;
        headerEl.style.background = input;
        updateThemeColorFromHeader();
        saveProject();
      });

      document.getElementById('set-app-icon').addEventListener('click', () => {
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'image/*';
        fileInput.onchange = async (e) => {
          const file = e.target.files && e.target.files[0];
          if (!file) return;
          const dataUrl = await readFileAsDataUrl(file);
          if (!dataUrl) return;
          const [icon512, icon192] = await Promise.all([
            resizeImageDataUrl(dataUrl, 512),
            resizeImageDataUrl(dataUrl, 192),
          ]);
          applyAppIcon(icon512, icon192);
          saveProject();
        };
        fileInput.click();
      });

      document.getElementById('create-screen').addEventListener('click', createSecondScreen);
      document.getElementById('copy-current-link').addEventListener('click', copyCurrentScreenLink);
      document.getElementById('share-link').addEventListener('click', copyCurrentScreenLink);
      document.getElementById('toggle-panel').addEventListener('click', () => {
        panelEl.classList.toggle('hidden');
      });
      document.getElementById('save-now').addEventListener('click', saveProject);

      document.getElementById('reset-layout').addEventListener('click', () => {
        if (!confirm('Удалить все экраны и перезагрузить страницу?')) return;
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(LEGACY_KEY);
        location.hash = '#screen=main';
        location.reload();
      });

      fixHeader.addEventListener('change', () => toggleFix('header'));
      fixFooter.addEventListener('change', () => toggleFix('footer'));
      blurToggle.addEventListener('change', saveProject);
    }

    function setupDoubleTapToToggleMenu() {
      let startX = 0;
      let startY = 0;
      let moved = false;
      let lastTouchTime = 0;
      let ignoreClickUntil = 0;

      const onTouchStart = (event) => {
        if (event.target.closest('#control-panel, #bottom-sheet')) return;
        const touch = event.touches[0];
        startX = touch.clientX;
        startY = touch.clientY;
        moved = false;
      };

      const onTouchMove = (event) => {
        const touch = event.touches[0];
        const dx = Math.abs(touch.clientX - startX);
        const dy = Math.abs(touch.clientY - startY);
        if (dx > 12 || dy > 12) {
          moved = true;
          ignoreClickUntil = Date.now() + 600;
        }
      };

      const onTouchEnd = (event) => {
        if (event.target.closest('#control-panel, #bottom-sheet')) return;
        if (moved) {
          lastTapTime = 0;
          return;
        }
        const now = Date.now();
        lastTouchTime = now;
        if (now - lastTapTime < 300) {
          panelEl.classList.toggle('hidden');
          lastTapTime = 0;
          return;
        }
        lastTapTime = now;
      };

      const onClick = (event) => {
        // Ignore synthetic click that follows touch
        if (Date.now() - lastTouchTime < 500) return;
        if (Date.now() < ignoreClickUntil) return;
        if (event.target.closest('#control-panel, #bottom-sheet')) return;
        const now = Date.now();
        if (now - lastTapTime < 300) {
          panelEl.classList.toggle('hidden');
          lastTapTime = 0;
          return;
        }
        lastTapTime = now;
      };

      document.body.addEventListener('touchstart', onTouchStart, { passive: true });
      document.body.addEventListener('touchmove', onTouchMove, { passive: true });
      document.body.addEventListener('touchend', onTouchEnd);
      document.body.addEventListener('click', onClick);
    }

    function handleHashChange() {
      const nextId = parseScreenIdFromHash();
      if (nextId === currentScreenId) return;
      saveProject();
      currentScreenId = nextId;
      loadProjectForCurrentScreen();
      const params = new URLSearchParams((location.hash || '').replace(/^#/, ''));
      const encoded = params.get('app');
      if (encoded) {
        const incoming = decodeStateFromHash(encoded);
        applyIncomingShare(incoming);
      }
      setupSectionResizeObserver();
      renderScreenLinks();
    }

    function init() {
      currentScreenId = parseScreenIdFromHash();
      if (!location.hash) {
        setScreenHash(currentScreenId, true);
      }

      migrateLegacyIfNeeded();
      loadScreensFromStorage();
      ensureScreenExists('main');
      ensureScreenExists(currentScreenId);
      loadProjectForCurrentScreen();
      const params = new URLSearchParams((location.hash || '').replace(/^#/, ''));
      const encoded = params.get('app');
      if (encoded) {
        const incoming = decodeStateFromHash(encoded);
        applyIncomingShare(incoming);
      }

      setupButtons();
      setupSectionResizeObserver();
      setupGlobalImageErrorCleanup();
      setupPrivacyBlurForAppSwitcher();
      renderScreenLinks();
      setupDoubleTapToToggleMenu();
      setupPullToRefreshForBody();

      document.getElementById('sheet-backdrop').addEventListener('click', closeBottomSheet);
      window.addEventListener('hashchange', handleHashChange);
      window.addEventListener('beforeunload', saveProject);
      window.addEventListener('resize', updateBodyPadding);
    }

    init();
  </script>
</body>
