<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Редактор блоков</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; font-family:Arial, sans-serif; background:#000; }
  body { display:flex; flex-direction:column; height:100vh; overflow:hidden; }

  .block { position: relative; width:100%; overflow:hidden; margin-bottom:2px; background:#111; cursor:pointer; border:1px solid #222; }

  img.preview-img { width:100%; height:auto; display:block; }

  input[type="file"] { display:none; }

  #bodyBlocks { position:absolute; top:0; bottom:0; width:100%; overflow-y:auto; display:flex; flex-direction:column; }

  .controls {
    display:flex;
    justify-content: space-between; /* Раздвигаем элементы по краям */
    align-items:center;
    padding:4px 8px;
    background: rgba(0,0,0,0.5);
    color:#fff;
    font-size:14px;
  }

  .add-btn {
    padding:5px 10px;
    background:#2196F3;
    border:none;
    border-radius:4px;
    color:#fff;
    cursor:pointer;
  }

  .horizontal-scroll {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
  }

  .horizontal-scroll img {
    width: 100vw;
    height: auto;
    flex-shrink: 0;
    scroll-snap-align: start;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="block" id="headerBlock">
  <div class="controls" id="headerControls">
    <label>Закрепить <input type="checkbox" id="headerFix" checked></label>
  </div>
  <img id="headerPreview" class="preview-img" alt="Header Фото">
  <input type="file" id="headerUpload" accept="image/*">
</div>

<!-- BODY -->
<div id="bodyBlocks">
  <div class="controls">
    <button class="add-btn" id="addBodyBlockBtn">Добавить блок</button>
  </div>
</div>

<!-- FOOTER -->
<div class="block" id="footerBlock">
  <div class="controls" id="footerControls">
    <label>Закрепить <input type="checkbox" id="footerFix" checked></label>
  </div>
  <img id="footerPreview" class="preview-img" alt="Footer Фото">
  <input type="file" id="footerUpload" accept="image/*">
</div>

<script>
// Регистрация service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js').then(()=>console.log('SW зарегистрирован'));
}

// Настройка блоков
function setupBlock(block, fileInput, fixCheckbox, controlsDiv, pos='') {
  block.addEventListener('click',(e)=>{
    if(e.target.tagName==='INPUT') return; // не открываем при клике по чекбоксу
    fileInput.click();
  });

  fileInput.addEventListener('change',()=>{
    const file=fileInput.files[0];
    if(!file) return;

    const reader=new FileReader();
    reader.onload=e=>block.querySelector('img').src=e.target.result;
    reader.readAsDataURL(file);

    // После выбора фото убираем чекбокс/контролы полностью
    controlsDiv.style.display='none';

    // Закрепляем, если выбрано
    if(fixCheckbox.checked){
      block.style.position='fixed';
      block.style[pos]='0';
    } else {
      block.style.position='relative';
      block.style[pos]='';
    }

    block.querySelector('img').onload=()=>{
      const img=block.querySelector('img');
      const aspect=img.naturalHeight/img.naturalWidth;
      block.style.height=block.clientWidth*aspect+'px';
      adjustBody();
    };
  });
}

// Подгонка body между header/footer
function adjustBody(){
  const bodyDiv=document.getElementById('bodyBlocks');
  const header=document.getElementById('headerBlock');
  const footer=document.getElementById('footerBlock');

  let top=(header.style.position==='fixed')?header.clientHeight:0;
  let bottom=(footer.style.position==='fixed')?footer.clientHeight:0;
  bodyDiv.style.top=top+'px';
  bodyDiv.style.bottom=bottom+'px';
}

// Настройка header/footer
setupBlock(document.getElementById('headerBlock'),document.getElementById('headerUpload'),document.getElementById('headerFix'),document.getElementById('headerControls'),'top');
setupBlock(document.getElementById('footerBlock'),document.getElementById('footerUpload'),document.getElementById('footerFix'),document.getElementById('footerControls'),'bottom');

// Добавление блоков в body
document.getElementById('addBodyBlockBtn').addEventListener('click',()=>{
  const bodyDiv=document.getElementById('bodyBlocks');
  const newBlock=document.createElement('div');
  newBlock.classList.add('block');
  newBlock.innerHTML=`
    <div class="controls">
      <button class="add-btn">Добавить фото (горизонтальный скрол)</button>
    </div>
    <div class="horizontal-scroll"></div>
    <input type="file" accept="image/*" multiple>
  `;
  bodyDiv.appendChild(newBlock);

  const fileInput=newBlock.querySelector('input[type=file]');
  const addBtn=newBlock.querySelector('button');
  const scrollDiv=newBlock.querySelector('.horizontal-scroll');

  addBtn.addEventListener('click',()=> fileInput.click());

  fileInput.addEventListener('change',()=>{
    const files=fileInput.files;
    for(let f of files){
      const reader=new FileReader();
      const img=document.createElement('img');
      reader.onload=e=>img.src=e.target.result;
      reader.readAsDataURL(f);
      scrollDiv.appendChild(img);
    }

    const firstImg=scrollDiv.querySelector('img');
    firstImg.onload=()=> newBlock.style.height=newBlock.clientWidth*(firstImg.naturalHeight/firstImg.naturalWidth)+'px';
    // После добавления фото можно скрыть кнопку, чтобы остался только скролл
    newBlock.querySelector('.controls').style.display='none';
  });
});
</script>

</body>
</html>
