<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Моё приложение</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header, footer {
      padding: 15px;
      text-align: center;
      background-color: #111;
      border-radius: 0;
      position: relative;
      overflow: hidden;
    }

    main {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      background-color: #000;
      position: relative;
    }

    .block {
      background-color: #222;
      padding: 15px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      position: relative;
    }

    .upload-btn {
      display: inline-block;
      background: #4CAF50;
      color: white;
      text-align: center;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      border: none;
      margin-bottom: 10px;
    }

    .preview-img {
      max-width: 100%;
      border-radius: 12px;
      box-shadow: 0 0 10px #fff;
    }

    #installBtn {
      display: none;
      background: #2196F3;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>🚀 Header</h1>
    <label class="upload-btn" for="headerUpload">Загрузить фото в Header</label>
    <input type="file" id="headerUpload" accept="image/*" style="display:none;">
    <img id="headerPreview" class="preview-img" alt="Header Фото">
  </header>

  <!-- BODY -->
  <main>
    <div class="block">
      <h2>Body</h2>
      <label class="upload-btn" for="bodyUpload">Загрузить фото в Body</label>
      <input type="file" id="bodyUpload" accept="image/*" style="display:none;">
      <img id="bodyPreview" class="preview-img" alt="Body Фото">
    </div>

    <div class="block">
      <button id="installBtn">Установить приложение</button>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>Footer</p>
    <label class="upload-btn" for="footerUpload">Загрузить фото в Footer</label>
    <input type="file" id="footerUpload" accept="image/*" style="display:none;">
    <img id="footerPreview" class="preview-img" alt="Footer Фото">
  </footer>

  <script>
    // --- PWA установка ---
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBtn').style.display = 'inline-block';
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt = null;
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log('Service Worker registered'));
    }

    // --- Загрузка фото ---
    function setupUpload(inputId, previewId) {
      const input = document.getElementById(inputId);
      const preview = document.getElementById(previewId);

      input.addEventListener('change', () => {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          preview.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    setupUpload('headerUpload', 'headerPreview');
    setupUpload('bodyUpload', 'bodyPreview');
    setupUpload('footerUpload', 'footerPreview');
  </script>
</body>
</html>
