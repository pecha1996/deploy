<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Моё приложение</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      height: 100%;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header, main, footer {
      position: relative;
      width: 100%;
      overflow: hidden;
    }

    header {
      height: 25vh;
      background-color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    main {
      height: 50vh;
      background-color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    footer {
      height: 25vh;
      background-color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    img.preview-img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .upload-btn {
      position: absolute;
      z-index: 1;
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 32px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }

    #headerBtn { top: 10px; right: 10px; }
    #bodyBtn { top: 10px; right: 10px; }
    #footerBtn { top: 10px; right: 10px; }

    input[type="file"] { display: none; }

    #installBtn {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      padding: 10px 20px;
      font-size: 16px;
      background: #2196F3;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: #fff;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <img id="headerPreview" class="preview-img" alt="Header Фото">
    <label id="headerBtn" class="upload-btn" for="headerUpload">+</label>
    <input type="file" id="headerUpload" accept="image/*">
  </header>

  <!-- BODY -->
  <main>
    <img id="bodyPreview" class="preview-img" alt="Body Фото">
    <label id="bodyBtn" class="upload-btn" for="bodyUpload">+</label>
    <input type="file" id="bodyUpload" accept="image/*">
    <button id="installBtn">Установить приложение</button>
  </main>

  <!-- FOOTER -->
  <footer>
    <img id="footerPreview" class="preview-img" alt="Footer Фото">
    <label id="footerBtn" class="upload-btn" for="footerUpload">+</label>
    <input type="file" id="footerUpload" accept="image/*">
  </footer>

  <script>
    // --- PWA установка ---
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBtn').style.display = 'inline-block';
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt = null;
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log('Service Worker registered'));
    }

    // --- Загрузка фото ---
    function setupUpload(inputId, previewId) {
      const input = document.getElementById(inputId);
      const preview = document.getElementById(previewId);

      input.addEventListener('change', () => {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          preview.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    setupUpload('headerUpload', 'headerPreview');
    setupUpload('bodyUpload', 'bodyPreview');
    setupUpload('footerUpload', 'footerPreview');
  </script>

</body>
</html>
